<section id="experience" class="section">

    <h2 class="gradient-text">
        Experience
    </h2>

    <div class="timeline">

        <div class="timeline-card" *ngFor="let exp of experience">

            <h3>{{exp.role}}</h3>

            <h4>{{exp.company}}</h4>

            <span>{{exp.duration}}</span>

            <ul>

                <li *ngFor="let item of exp.description">
                    {{item}}
                </li>

            </ul>

        </div>

    </div>

</section>
