<section id="skills" class="section">
  <h2 class="gradient-text">Technical Skills</h2>

  <div class="skills-grid">
    <div class="skill-card" *ngFor="let skill of skills">
      <div class="row">
        <span class="skill-name">
          {{ skill.name }}
        </span>
      </div>

      <div class="progress">
        <div class="progress-fill" [style.width.%]="skill.value"></div>
      </div>
    </div>
  </div>
</section>
