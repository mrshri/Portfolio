<section id="certifications" class="section">

    <h2 class="gradient-text">Certifications</h2>

    <div class="cert-grid">

        @for(cert of certifications; track cert.title){

            <div class="cert-card">

                <h3>{{cert.title}}</h3>

                <p>{{cert.issuer}}</p>

            </div>

        }

    </div>

</section>
