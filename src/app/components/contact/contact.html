<section class="contact section" id="contact">
  <div class="contact-header">
    <h2>Let's Work Together</h2>

    <p>Have a project, freelance work, or full-time opportunity? I'd love to hear from you.</p>
  </div>

  <form class="contact-form" (ngSubmit)="sendMessage()">
    <div class="input-group">
      <i class="fa-solid fa-user"></i>

      <input type="text" placeholder="Full Name" [(ngModel)]="contact.name" name="name" required />
    </div>

    <div class="input-group">
      <i class="fa-solid fa-envelope"></i>

      <input
        type="email"
        placeholder="Email Address"
        [(ngModel)]="contact.email"
        name="email"
        required
      />
    </div>

    <div class="input-group">
      <i class="fa-solid fa-pen"></i>

      <input
        type="text"
        placeholder="Subject"
        [(ngModel)]="contact.subject"
        name="subject"
        required
      />
    </div>

    <div class="input-group textarea">
      <i class="fa-solid fa-comment"></i>

      <textarea
        rows="6"
        placeholder="Tell me about your project..."
        [(ngModel)]="contact.message"
        name="message"
        required
      >
      </textarea>
    </div>

    <button class="send-btn" type="submit" [disabled]="sending">
      {{ sending ? 'Sending...' : '🚀 Send Message' }}
    </button>
    @if (success) {
      <div class="success">✅ Message Sent Successfully!</div>
    }
  </form>
</section>
